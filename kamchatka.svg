<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="kchSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="40%" stop-color="#2a1f3a"/>
      <stop offset="80%" stop-color="#5a2842"/>
      <stop offset="100%" stop-color="#7a3a3a"/>
    </linearGradient>
    <linearGradient id="kchVolcano" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde3ec"/>
      <stop offset="15%" stop-color="#a8b2c7"/>
      <stop offset="40%" stop-color="#52384a"/>
      <stop offset="100%" stop-color="#1a1424"/>
    </linearGradient>
    <linearGradient id="kchVolcShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="kchSnowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#f5f7fb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5f7fb" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="kchGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2730"/>
      <stop offset="100%" stop-color="#0e0a14"/>
    </linearGradient>
    <radialGradient id="kchSmoke">
      <stop offset="0%" stop-color="#dde3ec" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#a8b2c7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a8b2c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kchLavaGlow">
      <stop offset="0%" stop-color="#ff8c4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b3d" stop-opacity="0"/>
    </radialGradient>
    <!-- clipPath that matches the volcano triangle so snow stays inside it -->
    <clipPath id="volcanoClip">
      <polygon points="350,600 600,180 850,600"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#kchSky)"/>

  <!-- Stars -->
  <g fill="#e8eef7" opacity="0.7">
    <circle cx="80" cy="60" r="1"/>
    <circle cx="220" cy="120" r="0.7"/>
    <circle cx="380" cy="80" r="0.9"/>
    <circle cx="560" cy="100" r="0.6"/>
    <circle cx="720" cy="50" r="1.1"/>
    <circle cx="880" cy="130" r="0.8"/>
    <circle cx="1080" cy="70" r="0.9"/>
    <circle cx="150" cy="200" r="0.6"/>
    <circle cx="450" cy="180" r="0.8"/>
    <circle cx="950" cy="190" r="0.7"/>
  </g>

  <!-- Aurora hint above -->
  <g opacity="0.13">
    <path d="M 100 290 Q 350 240 600 280 Q 850 320 1100 280"
          stroke="#4FD1C5" stroke-width="50" fill="none" stroke-linecap="round"/>
    <path d="M 100 320 Q 350 280 600 310 Q 850 350 1100 310"
          stroke="#7eddc9" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Distant smaller mountain — left side -->
  <polygon fill="#3a2c40" opacity="0.55"
           points="0,580 70,500 130,540 180,580"/>

  <!-- Distant smaller volcano — right -->
  <polygon fill="#3a2c40" opacity="0.7"
           points="900,580 1000,400 1100,440 1200,580"/>
  <!-- Snow on its peak -->
  <polygon fill="#dde3ec" opacity="0.55"
           points="985,425 1000,400 1015,428 1005,440 998,432 992,442"/>

  <!-- MAIN VOLCANO — single triangle -->
  <polygon fill="url(#kchVolcano)"
           points="350,600 600,180 850,600"/>

  <!-- Side shadow on right -->
  <polygon fill="url(#kchVolcShadow)" opacity="0.4"
           points="600,180 850,600 600,600"/>

  <!-- ====== SNOW PATTERN — clipped to volcano shape, more natural ====== -->
  <g clip-path="url(#volcanoClip)">
    <!-- Top snowy cap (broad) -->
    <polygon fill="url(#kchSnowGrad)"
             points="540,300 600,180 660,300 645,330 625,310 600,335 575,310 555,330"/>

    <!-- Snow streaks running down from cap -->
    <g fill="#f5f7fb" opacity="0.85">
      <!-- center wide flow -->
      <path d="M 588 300 L 612 300 Q 615 380 614 460 L 608 540 L 605 600 L 595 600 L 592 540 L 586 460 Q 585 380 588 300 Z"/>
      <!-- left streak -->
      <path d="M 555 320 L 568 318 Q 562 380 555 440 L 545 520 L 540 600 L 530 600 L 535 520 L 545 440 Q 552 380 555 320 Z" opacity="0.7"/>
      <!-- another left streak -->
      <path d="M 510 380 L 522 378 Q 515 430 508 480 L 500 540 L 495 600 L 485 600 L 490 540 L 498 480 Q 505 430 510 380 Z" opacity="0.5"/>
      <!-- right streak -->
      <path d="M 632 320 L 645 318 Q 650 380 658 440 L 670 520 L 675 600 L 665 600 L 660 520 L 650 440 Q 642 380 632 320 Z" opacity="0.7"/>
      <!-- another right streak -->
      <path d="M 678 380 L 690 378 Q 695 430 702 480 L 712 540 L 718 600 L 708 600 L 703 540 L 695 480 Q 688 430 678 380 Z" opacity="0.5"/>
    </g>
  </g>

  <!-- Crater opening at top -->
  <ellipse cx="600" cy="190" rx="22" ry="6" fill="#0a0e1a"/>
  <!-- Lava glow inside crater -->
  <ellipse cx="600" cy="190" rx="18" ry="4" fill="#ff8c4a" opacity="0.85"/>
  <circle cx="600" cy="190" r="35" fill="url(#kchLavaGlow)" opacity="0.6"/>

  <!-- Subtle ridge lines -->
  <g stroke="#52384a" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 600 200 L 595 350 L 580 500 L 545 590"/>
    <path d="M 600 200 L 605 350 L 620 500 L 655 590"/>
  </g>

  <!-- Smoke plume drifting right -->
  <g>
    <ellipse cx="600" cy="130" rx="60" ry="35" fill="url(#kchSmoke)"/>
    <ellipse cx="660" cy="100" rx="80" ry="40" fill="url(#kchSmoke)" opacity="0.85"/>
    <ellipse cx="770" cy="85" rx="120" ry="50" fill="url(#kchSmoke)" opacity="0.75"/>
    <ellipse cx="900" cy="105" rx="140" ry="45" fill="url(#kchSmoke)" opacity="0.55"/>
    <ellipse cx="1050" cy="145" rx="120" ry="40" fill="url(#kchSmoke)" opacity="0.4"/>
  </g>

  <!-- Foreground / volcanic plain -->
  <rect y="600" width="1200" height="200" fill="url(#kchGround)"/>

  <!-- Lava trail descending past base -->
  <g fill="#ff6b3d" opacity="0.5">
    <path d="M 595 600 Q 590 650 588 700 L 597 710 Q 600 660 603 605 Z"/>
  </g>
  <ellipse cx="600" cy="610" rx="40" ry="8" fill="#ff8c4a" opacity="0.6"/>

  <!-- Steam pillars near base -->
  <g fill="#dde3ec" opacity="0.18">
    <ellipse cx="200" cy="640" rx="35" ry="55"/>
    <ellipse cx="220" cy="600" rx="25" ry="35"/>
    <ellipse cx="980" cy="650" rx="30" ry="45"/>
  </g>

  <!-- Foreground rocks -->
  <g fill="#0a0e1a" opacity="0.8">
    <ellipse cx="100" cy="780" rx="80" ry="14"/>
    <ellipse cx="380" cy="790" rx="110" ry="13"/>
    <ellipse cx="800" cy="785" rx="120" ry="14"/>
    <ellipse cx="1080" cy="790" rx="90" ry="12"/>
  </g>
</svg>
